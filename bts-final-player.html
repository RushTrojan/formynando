    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; color: white; }
        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #fff, #ffd700, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); }
        }
        .header p { font-size: 1.2rem; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; margin-top: 30px; }
        .sidebar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-height: 85vh;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.5); border-radius: 10px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-tab {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid transparent;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .filter-tab:hover, .filter-tab.active { background: rgba(255, 215, 0, 0.3); border-color: #ffd700; }
        .album-section { margin-bottom: 25px; }
        .album-header {
            color: #ffd700;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .album-header:hover { background: rgba(255, 215, 0, 0.2); }
        .song-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .song-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(8px);
            border-color: rgba(255, 215, 0, 0.3);
        }
        .song-item.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 105, 180, 0.3));
            border-color: #ffd700;
            transform: scale(1.02);
        }
        .song-item h4 { color: white; font-size: 0.95rem; margin-bottom: 3px; }
        .song-item p { color: rgba(255, 255, 255, 0.6); font-size: 0.8rem; }
        .member-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 105, 180, 0.3);
            border-radius: 10px;
            font-size: 0.75rem;
            margin-top: 3px;
        }
        .player-section { display: grid; gap: 25px; }
        .now-playing {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .artist-display {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 30px;
        }
        .artist-image {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .artist-image img { width: 100%; height: 100%; object-fit: cover; }
        .song-info h2 { color: white; font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .song-info h3 { color: rgba(255, 255, 255, 0.8); font-size: 1.3rem; margin-bottom: 10px; }
        .song-info .album { color: rgba(255, 255, 255, 0.6); font-size: 1rem; margin-bottom: 20px; }
        .visualizer {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: flex-end;
            height: 60px;
            margin: 20px 0;
        }
        .bar {
            width: 8px;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 4px;
            animation: wave 0.8s ease-in-out infinite;
        }
        .bar:nth-child(1) { animation-delay: 0s; height: 20px; }
        .bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .bar:nth-child(3) { animation-delay: 0.2s; height: 45px; }
        .bar:nth-child(4) { animation-delay: 0.3s; height: 35px; }
        .bar:nth-child(5) { animation-delay: 0.4s; height: 50px; }
        .bar:nth-child(6) { animation-delay: 0.5s; height: 40px; }
        .bar:nth-child(7) { animation-delay: 0.6s; height: 25px; }
        .bar:nth-child(8) { animation-delay: 0.7s; height: 35px; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
        }
        #videoPlayer { margin: 20px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .controls { display: flex; align-items: center; gap: 15px; justify-content: center; margin-top: 20px; }
        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.1); }
        .play-btn { width: 70px; height: 70px; background: linear-gradient(135deg, #ffd700, #ff69b4); font-size: 1.8rem; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(255, 255, 255, 0.15); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card .number { color: #ffd700; font-size: 1.5rem; font-weight: bold; display: block; }
        .stat-card .label { color: rgba(255, 255, 255, 0.7); font-size: 0.85rem; }
        .admin-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffd700;
            color: white;
            font-size: 0.9rem;
            max-width: 350px;
            display: none;
            z-index: 1000;

        .admin-panel.show { display: block; }
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ff69b4);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            z-index: 999;

        .admin-panel input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
        }
        .admin-panel button {
            background: #ffd700;
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;

            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);

            color: white;

        @media (max-width: 1200px) {

            .artist-display { grid-template-columns: 1fr; text-align: center; }
            .artist-image { margin: 0 auto; }
        }
    </style>
</head>

                            <div class="visualizer">

                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>

                    </div>
                    <div id="videoPlayer"></div>
                    <div class="controls">
                        <button class="control-btn" onclick="previousSong()" title="Previous">⏮️</button>
                        <button class="control-btn play-btn" onclick="togglePlay()" title="Play/Pause">▶️</button>
                        <button class="control-btn" onclick="nextSong()" title="Next">⏭️</button>
                        <button class="control-btn" onclick="shuffleSong()" title="Shuffle">🔀</button>
                    </div>
                    <div class="stats">
                        <div class="stat-card"><span class="number" id="statYear">2020</span><span class="label">Year</span></div>
                        <div class="stat-card"><span class="number" id="statType">Group</span><span class="label">Type</span></div>
                        <div class="stat-card"><span class="number" id="statAlbum">BE</span><span class="label">Album</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="admin-toggle" onclick="toggleAdmin()">🔧 Fix Videos</button>
    
    <div class="admin-panel" id="adminPanel">
        <h3 style="margin-bottom: 15px; color: #ffd700;">Update Video ID</h3>
        <p style="font-size: 0.85rem; margin-bottom: 10px;">Current: <span id="currentSongName">-</span></p>
        <label style="font-size: 0.8rem; opacity: 0.8;">Current YouTube ID:</label>
        <input type="text" id="currentVideoId" readonly>
        <label style="font-size: 0.8rem; opacity: 0.8; margin-top: 10px; display: block;">New YouTube ID:</label>
        <input type="text" id="newVideoId" placeholder="Enter new video ID">
        <div style="font-size: 0.75rem; opacity: 0.6; margin: 5px 0;">

        </div>
        <button onclick="searchYouTube()" style="background: #ff0000; color: white; width: 100%;">🔍 Search on YouTube</button>
        <button onclick="updateVideoId()">✅ Update Video</button>
        <button onclick="copyAllData()" style="background: #764ba2; color: white; margin-left: 5px;">💾 Save All Changes</button>
        <button onclick="toggleAdmin()" style="background: #666; color: white; margin-top: 5px;">❌ Close</button>
    </div>

let currentSongIndex = 0;
let currentFilter = 'all';
let filteredSongs = [];

function renderSongList() {
    const songListDiv = document.getElementById('songList');
    songListDiv.innerHTML = '';
    const albumGroups = {};
    filteredSongs.forEach((song, index) => {
        if (!albumGroups[song.album]) albumGroups[song.album] = [];
        albumGroups[song.album].push({...song, originalIndex: index});
    });
    Object.keys(albumGroups).forEach(albumName => {
        const albumSection = document.createElement('div');
        albumSection.className = 'album-section';
        const albumHeader = document.createElement('div');
        albumHeader.className = 'album-header';
        albumHeader.textContent = `🎧 ${albumName}`;
        albumSection.appendChild(albumHeader);
        albumGroups[albumName].forEach(song => {
            const songItem = document.createElement('div');
            songItem.className = 'song-item';
            if (song.originalIndex === currentSongIndex) songItem.classList.add('active');
            songItem.innerHTML = `<h4>${song.title}</h4><p>${song.artist}</p>${song.members ? `<span class="member-tag">${song.members}</span>` : ''}`;
            songItem.onclick = () => playSong(song.originalIndex);
            albumSection.appendChild(songItem);
        });
        songListDiv.appendChild(albumSection);
    });
}

function filterByType(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');
    filteredSongs = type === 'all' ? [...allSongs] : allSongs.filter(song => song.type === type);
    renderSongList();
}

function playSong(index) {
    currentSongIndex = index;
    const song = allSongs[index];
    document.getElementById('songTitle').textContent = song.title;
    document.getElementById('artistName').textContent = song.artist;
    document.getElementById('albumName').textContent = song.album;
    document.getElementById('artistImg').src = song.image;
    document.getElementById('statYear').textContent = song.year;
    document.getElementById('statType').textContent = song.type.charAt(0).toUpperCase() + song.type.slice(1);
    document.getElementById('statAlbum').textContent = song.album.split('—')[1]?.trim() || song.album;
    if (song.youtubeId) {
        document.getElementById('videoPlayer').innerHTML = `<iframe style="border-radius:12px" width="100%" height="400" src="https://www.youtube.com/embed/${song.youtubeId}?autoplay=1&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe><p style="color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-top: 10px; text-align: center;">⚠️ Video not playing? Click "🔧 Fix Videos" to update!</p>`;
    } else {
        document.getElementById('videoPlayer').innerHTML = '<div style="background: rgba(255,255,255,0.1); padding: 40px; border-radius: 12px; text-align: center;"><p style="color: white; font-size: 1.2rem;">❌ No video</p><p style="color: rgba(255,255,255,0.7); margin-top: 10px;">Click "🔧 Fix Videos" to add one!</p></div>';
    }
    renderSongList();
    if (document.getElementById('adminPanel').classList.contains('show')) updateAdminPanel();
}

function togglePlay() { alert('Use YouTube player controls! 🎵'); }
function previousSong() { playSong((currentSongIndex - 1 + allSongs.length) % allSongs.length); }
function nextSong() { playSong((currentSongIndex + 1) % allSongs.length); }
function shuffleSong() { playSong(Math.floor(Math.random() * allSongs.length)); }

document.getElementById('searchBox').addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    if (searchTerm === '') {
        filteredSongs = currentFilter === 'all' ? [...allSongs] : allSongs.filter(s => s.type === currentFilter);
    } else {
        const baseFilter = currentFilter === 'all' ? allSongs : allSongs.filter(s => s.type === currentFilter);
        filteredSongs = baseFilter.filter(song => song.title.toLowerCase().includes(searchTerm) || song.artist.toLowerCase().includes(searchTerm) || song.album.toLowerCase().includes(searchTerm) || (song.members && song.members.toLowerCase().includes(searchTerm)));
    }
    renderSongList();
});

function toggleAdmin() {
    const panel = document.getElementById('adminPanel');
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) updateAdminPanel();
}
function updateAdminPanel() {
    const song = allSongs[currentSongIndex];
    document.getElementById('currentSongName').textContent = song.title + ' - ' + song.artist;
    document.getElementById('currentVideoId').value = song.youtubeId || 'Not set';
    document.getElementById('newVideoId').value = '';
}
function searchYouTube() {
    const song = allSongs[currentSongIndex];
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(song.title + ' ' + song.artist + ' lyrics'), '_blank');
}
function updateVideoId() {
    const newId = document.getElementById('newVideoId').value.trim();
    if (!newId) return alert('Enter a YouTube video ID!');
    allSongs[currentSongIndex].youtubeId = newId;
    playSong(currentSongIndex);
    updateAdminPanel();
    alert('Video updated! Click "💾 Save All Changes" to save permanently.');
}
function copyAllData() {
    const dataStr = 'const allSongs = ' + JSON.stringify(allSongs, null, 2) + ';';
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
    modal.innerHTML = `<div style="background:white;padding:30px;border-radius:15px;max-width:800px;width:100%;max-height:90vh;overflow:auto;"><h3 style="color:#764ba2;margin-bottom:15px;">📋 Copy This Data</h3><p style="color:#666;font-size:0.9rem;margin-bottom:15px;">1. Click in box<br>2. Ctrl+A (or Cmd+A)<br>3. Ctrl+C (or Cmd+C)<br>4. Paste into HTML file</p><textarea id="dataOutput" style="width:100%;height:400px;padding:15px;border:2px solid #764ba2;border-radius:10px;font-family:monospace;font-size:0.85rem;" readonly>${dataStr}</textarea><div style="margin-top:15px;text-align:right;"><button onclick="this.parentElement.parentElement.parentElement.remove()" style="background:#764ba2;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold;">Close</button></div></div>`;
    document.body.appendChild(modal);
    setTimeout(() => { const t = document.getElementById('dataOutput'); t.focus(); t.select(); }, 100);
}

filteredSongs = [...allSongs];
renderSongList();
playSong(0);
